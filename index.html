<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubha & Kushal Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F0; /* Soft Cream */
            color: #5D4037; /* Warm Brown */
            font-family: 'Lato', sans-serif;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            border: 2px solid #D4AF37; /* Gold border */
            padding: 40px;
            background-color: #FFFFFF;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #B8860B; /* Dark Gold */
            margin-bottom: 10px;
        }
        .date {
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid #EEE;
            border-bottom: 1px solid #EEE;
            padding: 10px 0;
            display: inline-block;
        }
        p { line-height: 1.6; font-size: 1.1rem; }
        .venue { margin-top: 30px; font-style: italic; }
        .footer { margin-top: 50px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <p>With the blessings of Almighty,</p>
        <h1>Shubha & Kushal</h1>
        <p>Are getting married!</p>
        
        <div class="date">Saturday | May 9, 2026 | 6:00 PM</div>

        <div class="venue">
            <p><strong>Reception Venue:</strong><br>
            Gayatri Grand, Gate-4, Palace Ground<br>
            Bengaluru, Karnataka</p>
        </div>

        <p>We look forward to celebrating this special day with you.</p>
    </div>

    <div class="footer">
        © 2026 Shubha & Kushal Wedding Events
    </div>

</body>
</html>
